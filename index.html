<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://twemoji.maxcdn.com/v/latest/twemoji.min.js"></script>
<title>農工大???部</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:sans-serif;
background:#0a6b37;
overflow:hidden;
}

/* 背景 */
body::before{
content:"";
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.3);
pointer-events:none;
}

/* 🎁 */
#gift{
cursor:pointer;
z-index:30;
display:flex;
flex-direction:column;
align-items:center;
}

/* Canvas */
#confetti{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:15;
pointer-events:none;
}

#drawCanvas{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:20;
pointer-events:none;
touch-action:none;
}

/* ボックス */
.box-wrapper{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
}

.box{
background:white;
padding:30px;
max-width:600px;
transform:scale(0);
opacity:0;
pointer-events:none;
}

.box.active{
transform:scale(1);
opacity:1;
pointer-events:auto;
}

/* ボタン */
button{
margin:5px;
padding:8px;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>
<canvas id="drawCanvas"></canvas>

<div id="gift">
  <p style="color:white;">TAP ME</p>
  <img src="gift.png" width="150">
</div>

<div class="box-wrapper">
<div class="box">

<h1>おめでとう！</h1>

<p>
<a href="https://line.me" target="_blank">LINE</a>
</p>

<button id="drawToggle">✏️ OFF</button>
<button id="clearBtn">🧹</button>

</div>
</div>

<script>

/* ========= プレゼント ========= */
let opened=false;

const gift = document.getElementById("gift");
const box = document.querySelector(".box");

gift.onclick = ()=>{
if(opened) return;
opened=true;

gift.style.display="none";
box.classList.add("active");

explodeConfetti();
};

/* ========= Canvas ========= */
const confettiCanvas=document.getElementById("confetti");
const confettiCtx=confettiCanvas.getContext("2d");

const drawCanvas=document.getElementById("drawCanvas");
const drawCtx=drawCanvas.getContext("2d");

function resize(){
confettiCanvas.width=window.innerWidth;
confettiCanvas.height=window.innerHeight;
drawCanvas.width=window.innerWidth;
drawCanvas.height=window.innerHeight;
}
resize();
window.onresize=resize;

/* ========= 紙吹雪 ========= */
let particles=[];

function explodeConfetti(){
for(let i=0;i<120;i++){
particles.push({
x:confettiCanvas.width/2,
y:confettiCanvas.height/2,
vx:(Math.random()-0.5)*10,
vy:(Math.random()-0.5)*10,
life:100,
color:`hsl(${Math.random()*360},100%,60%)`
});
}
updateConfetti();
}

function updateConfetti(){
confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
p.vy+=0.2;
p.life--;

confettiCtx.fillStyle=p.color;
confettiCtx.fillRect(p.x,p.y,5,5);
});

particles=particles.filter(p=>p.life>0);

if(particles.length>0){
requestAnimationFrame(updateConfetti);
}
}

/* ========= 描画 ========= */
let drawEnabled=false;
let drawing=false;
let hue=0;

const drawBtn=document.getElementById("drawToggle");
const clearBtn=document.getElementById("clearBtn");

drawBtn.onclick=()=>{
drawEnabled=!drawEnabled;
drawCanvas.style.pointerEvents=drawEnabled?"auto":"none";
drawBtn.textContent=drawEnabled?"✏️ ON":"✏️ OFF";
};

clearBtn.onclick=()=>{
drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
};

/* PC */
drawCanvas.onmousedown=(e)=>{
if(!drawEnabled)return;
drawing=true;

const rect=drawCanvas.getBoundingClientRect();
drawCtx.beginPath();
drawCtx.moveTo(e.clientX-rect.left,e.clientY-rect.top);
};

drawCanvas.onmousemove=(e)=>{
if(!drawing)return;

const rect=drawCanvas.getBoundingClientRect();
drawCtx.lineTo(e.clientX-rect.left,e.clientY-rect.top);

drawCtx.strokeStyle=`hsl(${hue},100%,60%)`;
hue+=2;

drawCtx.lineWidth=3;
drawCtx.lineCap="round";
drawCtx.stroke();
};

drawCanvas.onmouseup=()=>drawing=false;
drawCanvas.onmouseleave=()=>drawing=false;

/* スマホ */
drawCanvas.ontouchstart=(e)=>{
if(!drawEnabled)return;

drawing=true;
const rect=drawCanvas.getBoundingClientRect();
const t=e.touches[0];

drawCtx.beginPath();
drawCtx.moveTo(t.clientX-rect.left,t.clientY-rect.top);
};

drawCanvas.ontouchmove=(e)=>{
if(!drawing)return;

e.preventDefault();

const rect=drawCanvas.getBoundingClientRect();
const t=e.touches[0];

drawCtx.lineTo(t.clientX-rect.left,t.clientY-rect.top);

drawCtx.strokeStyle=`hsl(${hue},100%,60%)`;
hue+=2;

drawCtx.lineWidth=3;
drawCtx.lineCap="round";
drawCtx.stroke();
};

drawCanvas.ontouchend=()=>drawing=false;

</script>
</body>
</html>
